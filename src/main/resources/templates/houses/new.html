<!doctype html>
<html lang="pt">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Ajudante — Nova Casa</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body class="bg-light">
<div class="container py-4" style="max-width: 700px;">

    <div class="d-flex align-items-center justify-content-between mb-3">
        <h1 class="h3 mb-0">🏠 Adicionar Casa</h1>
        <div class="d-flex gap-2">
            <a class="btn btn-outline-secondary btn-sm" href="/cinzaerosa/ui/shifts/new">Novo turno</a>
            <a class="btn btn-outline-secondary btn-sm" href="/cinzaerosa/ui/shifts/search">Procurar turnos</a>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">

            <!-- Alerts -->
            <div id="alertSuccess" class="alert alert-success d-none"></div>
            <div id="alertError" class="alert alert-danger d-none"></div>

            <!-- Client -->
            <div class="mb-3">
                <label class="form-label" for="clientSelect">Cliente (dono da casa)</label>
                <select id="clientSelect" class="form-select">
                    <option value="">— Seleciona um cliente —</option>
                </select>
                <div class="form-text">Obrigatório.</div>
            </div>

            <!-- Short Name -->
            <div class="mb-3">
                <label class="form-label" for="shortName">Código / Nome curto</label>
                <input id="shortName" type="text" class="form-control" placeholder="Ex: AD11"/>
                <div class="form-text">Identificador curto e único (usado nas listagens).</div>
            </div>

            <!-- Name -->
            <div class="mb-3">
                <label class="form-label" for="houseName">Nome / Morada</label>
                <input id="houseName" type="text" class="form-control" placeholder="Ex: Rua das Flores 12, 2º Dto"/>
                <div class="form-text">Nome completo ou morada da casa.</div>
            </div>

            <!-- Price -->
            <div class="mb-3">
                <label class="form-label" for="pricePerClean">Preço por limpeza (€)</label>
                <input id="pricePerClean" type="number" step="0.01" min="0" class="form-control" placeholder="Ex: 45.00"/>
                <div class="form-text">Valor cobrado por sessão de limpeza.</div>
            </div>

            <!-- Submit -->
            <div class="d-flex gap-2">
                <button id="btnSubmit" class="btn btn-primary">Guardar</button>
                <button id="btnReset" class="btn btn-outline-secondary">Limpar</button>
            </div>

        </div>
    </div>
</div>

<script>
    const BASE = "/cinzaerosa";

    const elClientSelect = document.getElementById("clientSelect");
    const elShortName = document.getElementById("shortName");
    const elHouseName = document.getElementById("houseName");
    const elPrice = document.getElementById("pricePerClean");
    const elAlertSuccess = document.getElementById("alertSuccess");
    const elAlertError = document.getElementById("alertError");

    function showError(msg) {
        elAlertError.textContent = msg;
        elAlertError.classList.remove("d-none");
        elAlertSuccess.classList.add("d-none");
    }

    function showSuccess(msg) {
        elAlertSuccess.textContent = msg;
        elAlertSuccess.classList.remove("d-none");
        elAlertError.classList.add("d-none");
    }

    function clearAlerts() {
        elAlertSuccess.classList.add("d-none");
        elAlertError.classList.add("d-none");
    }

    async function loadClients() {
        const res = await fetch(BASE + "/clients");
        if (!res.ok) {
            showError("Erro ao carregar clientes.");
            return;
        }
        const clients = await res.json();
        clients.sort((a, b) => a.name.localeCompare(b.name, "pt", {sensitivity: "base"}));

        clients.forEach(c => {
            const opt = document.createElement("option");
            opt.value = String(c.id);
            opt.textContent = c.name;
            elClientSelect.appendChild(opt);
        });
    }

    async function submit() {
        clearAlerts();

        const clientId = elClientSelect.value;
        const shortName = elShortName.value.trim();
        const name = elHouseName.value.trim();
        const price = elPrice.value;

        if (!clientId) return showError("Seleciona um cliente.");
        if (!shortName) return showError("O código / nome curto é obrigatório.");
        if (!name) return showError("O nome / morada é obrigatório.");
        if (!price || parseFloat(price) <= 0) return showError("O preço deve ser maior que 0.");

        const body = {
            clientId: parseInt(clientId, 10),
            shortName: shortName,
            name: name,
            pricePerClean: parseFloat(price)
        };

        const res = await fetch(BASE + "/houses", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(body)
        });

        if (res.ok) {
            const created = await res.json();
            showSuccess(`✅ Casa "${created.shortName}" criada com sucesso!`);
            elShortName.value = "";
            elHouseName.value = "";
            elPrice.value = "";
            elClientSelect.value = "";
            return;
        }

        let errMsg = "Erro ao criar casa.";
        try {
            const err = await res.json();
            errMsg = err.message ?? errMsg;
        } catch (_) {}

        showError(errMsg);
    }

    document.getElementById("btnSubmit").onclick = submit;

    document.getElementById("btnReset").onclick = () => {
        clearAlerts();
        elShortName.value = "";
        elHouseName.value = "";
        elPrice.value = "";
        elClientSelect.value = "";
    };

    loadClients();
</script>

</body>
</html>
